version: '3.8'
services:
  db:
    image: postgres:16.2
    container_name: booktour-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: quang
      POSTGRES_DB: booktour_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
