version: '3.8'
services:
  db:
    image: postgres:16.2
    container_name: booktour-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: quang
      POSTGRES_DB: booktour_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: booktour-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data



volumes:
  pgdata:
  redis_data:
